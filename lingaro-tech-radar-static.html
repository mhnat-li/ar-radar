<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lingaro Tech Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;--surface:#F5F3F9;--s1:#F4F1FA;--s2:#E7E1F0;
  --border:rgba(30,20,60,0.10);--bstr:rgba(30,20,60,0.18);--bblu:rgba(0,120,212,0.42);
  --ms-blue:#0078D4;--ms-blue2:#106EBE;
  --text:#1E2430;--tdim:#4A5568;--tmut:#8A93A3;
  --hh:58px;--pw:452px;
  --fh:'Maven Pro',sans-serif;--fm:'JetBrains Mono',monospace;--fb:'Outfit',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased}

#app{display:flex;flex-direction:column;height:100vh}

/* ─ HEADER ─ */
header{
  height:var(--hh);display:flex;align-items:center;gap:14px;padding:0 22px;
  background:rgba(255,255,255,0.95);border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);z-index:100;flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-txt{font-family:var(--fh);font-weight:700;font-size:13.5px;letter-spacing:1.5px;text-transform:uppercase}
.hdr-div{width:1px;height:18px;background:var(--bstr)}
.hdr-tag{font-family:var(--fm);font-size:9.5px;color:var(--tmut);letter-spacing:2px;text-transform:uppercase}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.srch-wrap{position:relative}
.srch-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tmut);pointer-events:none}
.srch{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 30px;font-family:var(--fb);font-size:12.5px;color:var(--text);outline:none;width:200px;transition:border-color .2s,width .3s}
.srch::placeholder{color:var(--tmut)}.srch:focus{border-color:var(--bblu);width:260px}

main{flex:1;position:relative;overflow:hidden}

/* ─ RADAR AREA ─ */
.radar-area{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 16px 54px;overflow:hidden}
#radar-svg{width:100%;height:100%;max-width:calc(100vh - var(--hh) - 118px);max-height:calc(100vh - var(--hh) - 118px)}

/* ─ BREADCRUMB ─ */
#breadcrumb{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(14px);
  padding:6px 12px;border-radius:100px;border:1px solid var(--border);z-index:10;
  box-shadow:0 2px 10px rgba(30,20,60,0.06);max-width:90%;overflow:hidden
}
.crumb{font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--ms-blue);cursor:pointer;white-space:nowrap;padding:2px 4px;border-radius:5px;transition:background .13s}
.crumb:hover{background:rgba(0,120,212,0.08)}
.crumb.current{color:var(--text);cursor:default}
.crumb.current:hover{background:transparent}
.crumb-sep{color:var(--tmut);font-size:10px}

/* ─ RING LEGEND ─ */
#ring-filter{position:absolute;top:12px;right:16px;display:flex;flex-direction:column;gap:3px;background:rgba(255,255,255,0.9);backdrop-filter:blur(14px);padding:8px 10px;border-radius:12px;border:1px solid var(--border);z-index:10;box-shadow:0 2px 10px rgba(30,20,60,0.06)}
.rf-title{font-family:var(--fm);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--tmut);margin-bottom:2px}
.rpill{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:7px;cursor:pointer;font-family:var(--fm);font-size:8.5px;font-weight:500;color:var(--tdim);text-transform:uppercase;letter-spacing:.5px;transition:all .15s;border:1px solid transparent}
.rpill:hover{background:rgba(30,20,60,0.05)}
.rpill.on{background:rgba(30,20,60,0.07);border-color:var(--bstr);color:var(--text)}
.rpip{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ─ QUAD LEGEND ─ */
#quad-legend{position:absolute;bottom:13px;left:50%;transform:translateX(-50%);display:flex;gap:3px;flex-wrap:wrap;justify-content:center;background:rgba(255,255,255,0.9);backdrop-filter:blur(14px);padding:4px 9px;border-radius:100px;border:1px solid var(--border);z-index:10;box-shadow:0 2px 10px rgba(30,20,60,0.06);max-width:94%}
.qpill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;border:1px solid transparent;background:transparent;cursor:pointer;font-family:var(--fm);font-size:8.5px;font-weight:500;color:var(--tdim);text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
.qpill:hover{color:var(--text);background:rgba(30,20,60,0.05)}
.qpill.on{color:var(--text);background:rgba(30,20,60,0.07);border-color:var(--bstr)}
.qdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ─ DETAIL PANEL ─ */
.detail-panel{position:absolute;right:0;top:0;bottom:0;width:var(--pw);background:rgba(250,248,253,0.98);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .44s cubic-bezier(0.16,1,0.3,1);overflow:hidden;z-index:50;backdrop-filter:blur(20px);box-shadow:-24px 0 60px rgba(30,20,60,0.14)}
.detail-panel.open{transform:translateX(0)}
.panel-welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:9px}
.wel-icon{width:54px;height:54px;border-radius:13px;background:var(--s1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:4px;color:var(--tmut)}
.wel-title{font-family:var(--fh);font-weight:600;font-size:15px;color:var(--tdim)}
.wel-sub{font-size:12.5px;color:var(--tmut);line-height:1.65}
#panel-content{display:none;flex-direction:column;flex:1;min-height:0}
.phdr{padding:16px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.phdr-r1{display:flex;align-items:flex-start;gap:11px;margin-bottom:9px}
.ticon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pname{font-family:var(--fh);font-size:18px;font-weight:700;line-height:1.2;flex:1;padding-top:2px}
.btn-x{width:25px;height:25px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--tmut);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .13s;flex-shrink:0}
.btn-x:hover{background:rgba(30,20,60,0.06);color:var(--text)}
.pbadges{display:flex;gap:5px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:100px;font-family:var(--fm);font-size:8.5px;font-weight:500;letter-spacing:.4px;border:1px solid var(--border)}
.bpip{width:5px;height:5px;border-radius:50%}
.pbody{flex:1;overflow-y:auto;padding:2px 18px 22px}
.pbody::-webkit-scrollbar{width:3px}.pbody::-webkit-scrollbar-thumb{background:var(--s2);border-radius:2px}
.slabel{font-family:var(--fm);font-size:8.5px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--tmut);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.slabel::after{content:'';flex:1;height:1px;background:var(--border)}
.tdesc{font-size:12.5px;line-height:1.78;color:var(--tdim)}
/* drill list */
.drill-item{display:flex;align-items:center;gap:11px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .16s,transform .1s}
.drill-item:hover{border-color:var(--bblu);transform:translateX(2px)}
.drill-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--fh);font-weight:700;font-size:11px}
.drill-main{flex:1;min-width:0}
.drill-name{font-family:var(--fh);font-weight:600;font-size:13px;margin-bottom:1px}
.drill-meta{font-size:10.5px;color:var(--tmut)}
.drill-arrow{color:var(--tmut);flex-shrink:0}
/* expert cards */
.ecard{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:8px;transition:border-color .18s}
.ecard:hover{border-color:var(--bblu)}
.etop{display:flex;gap:10px;align-items:flex-start;margin-bottom:9px}
.eavatar{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:12.5px;flex-shrink:0}
.ename{font-family:var(--fh);font-weight:600;font-size:13px;margin-bottom:1px}
.erole{font-size:11px;color:var(--tdim);margin-bottom:5px}
.emeta{display:flex;gap:5px;flex-wrap:wrap}
.echip{display:inline-flex;align-items:center;gap:3px;font-family:var(--fm);font-size:9px;color:var(--tmut);background:var(--s2);padding:2px 7px;border-radius:100px}
.ebio{font-size:11.5px;line-height:1.67;color:var(--tmut);margin-top:8px}
/* ─ RATE GRID ─ */
.rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.rate-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:13px 12px;text-align:center}
.rate-currency{font-family:var(--fm);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--tmut);margin-bottom:5px}
.rate-amount{font-family:var(--fh);font-weight:700;font-size:19px;color:var(--text);line-height:1.1}
.rate-unit{font-family:var(--fm);font-size:8px;color:var(--tmut);margin-top:3px;letter-spacing:.5px}
/* ─ SKILL TAGS ─ */
.skill-tags{display:flex;flex-wrap:wrap;gap:5px}
.skill-tag{font-family:var(--fm);font-size:9px;color:var(--tdim);background:var(--s2);padding:3px 9px;border-radius:100px;letter-spacing:.3px}
/* clickable ecard */
.ecard{cursor:pointer}

/* ─ BLIPS ─ */
.blip{cursor:pointer;transition:opacity .22s}
.blip.dim{opacity:.12;pointer-events:none}
.blip.sel .bmain{filter:url(#glow-active)}
.blip-label{font-family:var(--fb);font-size:9px;font-weight:500;fill:var(--tdim);pointer-events:none;text-anchor:middle}

/* ─ TOOLTIP ─ */
#tip{position:fixed;z-index:1000;background:#fff;border:1px solid var(--bblu);padding:5px 10px;border-radius:7px;font-family:var(--fm);font-size:10.5px;color:var(--text);pointer-events:none;opacity:0;transition:opacity .1s;white-space:nowrap;box-shadow:0 6px 24px rgba(30,20,60,.20)}
#tip.show{opacity:1}

@keyframes pfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.pfade{animation:pfade .28s ease forwards}
@keyframes bpulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.3);opacity:0}}
.bpulse{transform-box:fill-box;transform-origin:center;animation:bpulse 2.8s ease-out infinite}
@keyframes radarIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
#blip-g{animation:radarIn .34s cubic-bezier(0.16,1,0.3,1)}
*{scrollbar-width:thin;scrollbar-color:var(--s2) transparent}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <span class="logo-txt">Lingaro Tech Radar</span>
    </div>
    <div class="hdr-div"></div>
    <div class="hdr-tag">Technology Radar · 2026</div>
    <div class="hdr-r">
      <div class="srch-wrap">
        <svg class="srch-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="srch" id="srch" type="text" placeholder="Search technologies…">
      </div>
    </div>
  </header>
  <main>
    <div class="radar-area">
      <div id="breadcrumb"></div>
      <div id="ring-filter"></div>
      <svg id="radar-svg" viewBox="0 0 1000 1000"></svg>
      <div id="quad-legend"></div>
    </div>
    <div class="detail-panel" id="panel">
      <div class="panel-welcome" id="pwel">
        <div class="wel-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>
        <div class="wel-title">Select a technology</div>
        <div class="wel-sub">Click any blip to drill into its<br>sub-technologies and expert profiles.</div>
      </div>
      <div id="panel-content"></div>
    </div>
  </main>
  <div id="tip"></div>
</div>

//  Levels: Category → Technology → Sub-technology → Profiles
//  Rings (outer→inner): Regular Dev, Mid Dev, Senior Dev, Experts
// ═══════════════════════════════════════════════════════════════

// Six categories from the Copilot ecosystem wheel (arranged around the radar)
const CATS = [
  {id:0, name:'Operating Systems',      short:'OS',        color:'#2E7D32'},
  {id:1, name:'Developer',              short:'DEV',       color:'#5E35B1'},

  {id:5, name:'Browser & Search',       short:'BROWSER',   color:'#E65100'},

// Rings — index 0 = innermost (Experts), 3 = outermost (Regular Developer)
const RINGS = [
  {id:0, name:'Experts',            color:'#8E24AA'},

// ── Dummy profile pool ─────────────────────────────────────────
// Each profile: name, role, yrs, ini, bio. `ring` sets seniority tier.
function P(name, role, yrs, ring, bio){
  const ini = name.split(' ').map(w=>w[0]).slice(0,2).join('');
  return {name, role, yrs, ring, ini, bio};
}

// ── TECHNOLOGY TREE ────────────────────────────────────────────
// Each technology sits at a category (cat) and a ring (r, its "headline" tier).
// `subs` = sub-technologies; each sub has its own ring + profiles spread across tiers.
const TECH = [

  // ═══ OPERATING SYSTEMS (cat 0) ═══════════════════════════════
  {id:'t1', cat:0, r:0, name:'Windows 11', desc:'Modern Microsoft desktop OS and the primary endpoint for Copilot, Intune management and enterprise deployment.',
    subs:[
      {name:'Windows Copilot', r:0, profiles:[

        P('Adam Górski','Regular Endpoint Dev',2,3,'Maintains device configuration profiles and reporting dashboards.'),

      {name:'Defender / Security', r:1, profiles:[

      ]},
    ]},
  {id:'t2', cat:0, r:2, name:'Windows Apps', desc:'Built-in productivity apps — Notepad, Paint, Photos, Snipping Tool, Clipchamp — increasingly Copilot-enhanced.',

      {name:'Paint / Photos AI', r:3, profiles:[

  // ═══ DEVELOPER (cat 1) ═══════════════════════════════════════
  {id:'t3', cat:1, r:0, name:'Visual Studio', desc:'Flagship IDE for .NET, C++ and enterprise application development with deep Copilot integration.',

  {id:'t4', cat:1, r:1, name:'VS Code', desc:'Lightweight cross-platform editor; the default surface for web, Python and cloud development.',

      {name:'Dev Containers', r:2, profiles:[

  // ═══ BUSINESS APPLICATIONS (cat 2) ═══════════════════════════
  {id:'t7', cat:2, r:0, name:'Power Platform', desc:'Low-code suite: Power Apps, Power Automate, Power BI and Copilot Studio for citizen and pro developers.',

      {name:'Sales / CE', r:1, profiles:[

function profileRates(p){
  const seed=hashStr(p.name+p.role);const g=rng(seed);
  const base=RATE_BASE_EUR[p.ring];
  const j=(g()-0.5)*0.26;                              // ±13% jitter
  const eur=Math.round(base*(1+j)/5)*5;                // round to nearest €5
  const pln=Math.round(eur*(4.10+g()*0.22)/10)*10;    // 4.10–4.32 ratio, round 10 zł
  const usd=Math.round(eur*(1.05+g()*0.08)/5)*5;      // 1.05–1.13 ratio
  const chf=Math.round(eur*(0.90+g()*0.07)/5)*5;      // 0.90–0.97 ratio
  return{eur,pln,usd,chf};
}
function profileExtras(p){
  const seed=hashStr(p.name+p.yrs);const g=rng(seed);
  const desc=PROF_DESCS[Math.floor(g()*PROF_DESCS.length)];
  const pool=SKILLS_POOL[Math.floor(g()*SKILLS_POOL.length)];
  const n=3+Math.floor(g()*3);
  const skills=pool.slice(0,Math.min(n,pool.length));
  const engagement=ENGAGEMENT_MODELS[Math.floor(g()*ENGAGEMENT_MODELS.length)];
  const avail=AVAIL_LABELS[Math.floor(g()*AVAIL_LABELS.length)];
  return{desc,skills,engagement,avail};
}

function catArcPadded(i){

function rng(seed){let s=seed|0;return()=>{s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296};}

//  level 2: one sub-tech selected                   → panel lists profiles
// ═══════════════════════════════════════════════════════════════
let nav = {tech:null, sub:null, profile:null};   // tech object, sub object, profile object
let activeR=null, srchQ='', selKey=null;

// Build the list of blips for the current level.
function currentBlips(){
  if(!nav.tech){
    // Level 0 — all technologies, positioned in their category wedge + headline ring
    return TECH.map(t=>({
      key:t.id, name:t.name, cat:t.cat, r:t.r, kind:'tech', ref:t,
      count:t.subs.reduce((a,s)=>a+s.profiles.length,0)
    }));
  }
  // Level 1 — sub-technologies of the selected tech, all in that tech's category wedge
  return nav.tech.subs.map((s,i)=>({
    key:nav.tech.id+'::'+i, name:s.name, cat:nav.tech.cat, r:s.r, kind:'sub', ref:s, idx:i,
    count:s.profiles.length
  }));
}

// Assign x/y to blips: spread across category wedge, jitter within ring band.
function placeBlips(blips){
  // Group by category+ring band, then distribute EVENLY across the wedge angle
  // and stagger radius per index so logo tiles + labels never collide.
  const groups={};
  for(const b of blips){const k=`${b.cat}|${b.r}`;(groups[k]=groups[k]||[]).push(b);}
  for(const grp of Object.values(groups)){
    const cat=grp[0].cat, r=grp[0].r;
    let [as,ae]=catArcPadded(cat);
    // extra angular inset so tiles don't touch the spoke dividers
    const inset=0.06; as+=inset; ae-=inset;
    const rMin=RB[r]+22, rMax=RB[r+1]-18;
    const span=ae-as, n=grp.length;
    // deterministic order for stable layout
    grp.sort((a,b)=>hashStr(a.key)-hashStr(b.key));
    grp.forEach((b,i)=>{
      // even angular slot centres
      const ang = n===1 ? (as+ae)/2 : as + span*(i+0.5)/n;
      // radius: distribute across the full band. For 2+ blips, alternate a large
      // near/far swing so tiles are pushed apart radially as well as angularly.
      let radT;
      if(n===1){radT=0.52;}
      else if(n===2){radT = i===0 ? 0.24 : 0.80;}
      else{
        // cycle low/high/mid to maximise separation
        const cyc=[0.20,0.82,0.50,0.66,0.34];
        radT=cyc[i%cyc.length];
      }
      const g=rng(hashStr(b.key)*7919);
      radT += (g()-0.5)*0.06;
      radT=Math.max(0.06,Math.min(0.94,radT));
      const rad=rMin+radT*(rMax-rMin);
      b.x=CX+rad*Math.cos(ang); b.y=CY+rad*Math.sin(ang);
    });
  }
  return blips;
}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}return Math.abs(h)+1;}

// ═══════════════════════════════════════════════════════════════
//  BUILD RADAR
// ═══════════════════════════════════════════════════════════════
function buildRadar(){
  const svg=document.getElementById('radar-svg');
  svg.innerHTML='';
  const defs=E('defs');

  const cl=E('clipPath',{id:'rclip'});cl.appendChild(E('circle',{cx:CX,cy:CY,r:MAX_R}));defs.appendChild(cl);
  const gf=E('filter',{id:'glow',x:'-60%',y:'-60%',width:'220%',height:'220%'});
  const gb=E('feGaussianBlur',{stdDeviation:'2.4',result:'b'});const gm=E('feMerge');
  gm.appendChild(E('feMergeNode',{in:'b'}));gm.appendChild(E('feMergeNode',{in:'SourceGraphic'}));
  gf.appendChild(gb);gf.appendChild(gm);defs.appendChild(gf);
  const gfa=E('filter',{id:'glow-active',x:'-90%',y:'-90%',width:'280%',height:'280%'});
  const gba=E('feGaussianBlur',{stdDeviation:'5',result:'b'});const gma=E('feMerge');
  gma.appendChild(E('feMergeNode',{in:'b'}));gma.appendChild(E('feMergeNode',{in:'SourceGraphic'}));
  gfa.appendChild(gba);gfa.appendChild(gma);defs.appendChild(gfa);
  svg.appendChild(defs);

  svg.appendChild(E('rect',{width:1000,height:1000,fill:'#FFFFFF'}));

  // grid dots
  const gdg=E('g',{opacity:'0.5','clip-path':'url(#rclip)'});
  for(let deg=0;deg<360;deg+=12){for(const rb of [56,162,272,378]){const a=deg*Math.PI/180;gdg.appendChild(E('circle',{cx:(CX+rb*Math.cos(a)).toFixed(1),cy:(CY+rb*Math.sin(a)).toFixed(1),r:'1',fill:'#CBD3DE'}));}}
  svg.appendChild(gdg);

  // category wedge tints (highlight active category chain if drilled in)
  for(const c of CATS){
    const [sa,ea]=catArc(c.id);
    const active = nav.tech ? (c.id===nav.tech.cat) : true;
    const alpha = active ? '14' : '07';
    svg.appendChild(E('path',{d:arcPath(CX,CY,MAX_R,sa,ea),fill:c.color+alpha,'clip-path':'url(#rclip)'}));
  }

  // ring borders
  for(let i=1;i<RB.length;i++){
    const outer=i===RB.length-1;
    svg.appendChild(E('circle',{cx:CX,cy:CY,r:RB[i],fill:'none',stroke:outer?'rgba(30,20,60,0.22)':'rgba(30,20,60,0.10)','stroke-width':outer?1.5:1,'stroke-dasharray':i%2===0?'5 8':'none'}));
  }

  // category divider lines (spokes)
  const dvg=E('g',{'clip-path':'url(#rclip)'});
  for(let i=0;i<NC;i++){const [sa]=catArc(i);dvg.appendChild(E('line',{x1:CX,y1:CY,x2:CX+MAX_R*Math.cos(sa),y2:CY+MAX_R*Math.sin(sa),stroke:'rgba(30,20,60,0.09)','stroke-width':'1'}));}
  svg.appendChild(dvg);

  // ring labels (top vertical axis)
  for(const [i,rv] of RINGS.entries()){
    const yp=CY-ringMidR[i];const g=E('g');
    const tw=rv.name.length*5.6+18;
    g.appendChild(E('rect',{x:CX-tw/2,y:yp-8,width:tw,height:16,rx:8,fill:'rgba(255,255,255,0.92)',stroke:'rgba(30,20,60,0.12)','stroke-width':'1'}));
    const t=E('text',{x:CX,y:yp+4,'text-anchor':'middle',fill:rv.color,'font-family':'JetBrains Mono,monospace','font-size':'7.5','font-weight':'600','letter-spacing':'1'});
    t.textContent=rv.name.toUpperCase();g.appendChild(t);svg.appendChild(g);
  }

  // category labels around the rim
  for(const c of CATS){
    const [sa,ea]=catArc(c.id);const mid=(sa+ea)/2;
    const lr=MAX_R+2;let x=CX+lr*Math.cos(mid),y=CY+lr*Math.sin(mid);
    // clamp inside viewbox-ish; place label chip near rim inside
    const ir=MAX_R-34;x=CX+ir*Math.cos(mid);y=CY+ir*Math.sin(mid);
    const tw=c.name.length*6+22;const g=E('g',{style:'cursor:pointer'});g.dataset.catlabel=c.id;
    g.appendChild(E('rect',{x:x-tw/2,y:y-11.5,width:tw,height:21,rx:6,fill:c.color+'1E',stroke:c.color+'66','stroke-width':'1'}));
    g.appendChild(E('circle',{cx:x-tw/2+9,cy:y+1,r:'3.5',fill:c.color}));
    const t=E('text',{x:x-tw/2+18,y:y+4.5,'text-anchor':'start',fill:'rgba(30,20,60,0.85)','font-family':'Maven Pro,sans-serif','font-size':'10','font-weight':'600','letter-spacing':'0.2'});
    t.textContent=c.name.toUpperCase();g.appendChild(t);svg.appendChild(g);
  }

  // ── BLIPS ──
  const blips=placeBlips(currentBlips());
  const bg=E('g',{id:'blip-g'});
  for(const b of blips){
    const cc=CATS[b.cat], rc=RINGS[b.r];
    const g=E('g',{class:'blip','data-key':b.key,transform:`translate(${b.x.toFixed(2)},${b.y.toFixed(2)})`});
    // pulse ring for Experts tier (innermost)
    if(b.r===0){g.appendChild(E('circle',{cx:0,cy:0,r:16,fill:'none',stroke:cc.color,'stroke-width':'1.4',class:'bpulse',style:`animation-delay:${((hashStr(b.key)*0.13)%2.8).toFixed(2)}s`}));}
    // soft drop shadow
    g.appendChild(E('circle',{cx:0,cy:1,r:15.5,fill:'rgba(30,20,60,0.14)'}));
    // white logo tile with category-colored ring (this is .bmain, the hover/scale target)
    const tile=E('circle',{cx:0,cy:0,r:14,fill:'#FFFFFF',stroke:cc.color,'stroke-width':'2.4',class:'bmain',filter:'url(#glow)'});
    g.appendChild(tile);
    // product icon, scaled to fit inside the tile (~20px box centered)
    const iconWrap=E('g',{transform:'translate(-10,-10) scale(0.83)','pointer-events':'none'});
    iconWrap.innerHTML=iconForBlip(b);
    g.appendChild(iconWrap);
    // tier indicator dot (top-right)
    g.appendChild(E('circle',{cx:10,cy:-10,r:4.2,fill:rc.color,stroke:'#FFFFFF','stroke-width':'1.4'}));
    // profile-count mini badge (bottom-right)
    const cb=E('g',{'pointer-events':'none'});
    cb.appendChild(E('circle',{cx:11,cy:11,r:6,fill:cc.color,stroke:'#FFFFFF','stroke-width':'1.2'}));
    const nt=E('text',{x:11,y:13.6,'text-anchor':'middle',fill:'#fff','font-family':'JetBrains Mono,monospace','font-size':'7.5','font-weight':'600'});
    nt.textContent=b.count;cb.appendChild(nt);
    g.appendChild(cb);
    // name label under blip
    const lbl=E('text',{class:'blip-label',x:0,y:30});lbl.textContent=b.name.length>20?b.name.slice(0,19)+'…':b.name;g.appendChild(lbl);
    bg.appendChild(g);
    b._el=g;
  }
  svg.appendChild(bg);
  svg.appendChild(E('circle',{cx:CX,cy:CY,r:2.5,fill:'rgba(30,20,60,0.3)'}));

  // center hub label when drilled in
  if(nav.tech){
    const hub=E('g',{style:'cursor:pointer'});hub.dataset.hub='1';
    hub.appendChild(E('circle',{cx:CX,cy:CY,r:34,fill:'#fff',stroke:CATS[nav.tech.cat].color,'stroke-width':'2'}));
    const ht=E('text',{x:CX,y:CY-2,'text-anchor':'middle',fill:CATS[nav.tech.cat].color,'font-family':'Maven Pro,sans-serif','font-size':'9','font-weight':'700'});
    ht.textContent='◀ BACK';hub.appendChild(ht);
    const ht2=E('text',{x:CX,y:CY+9,'text-anchor':'middle',fill:'var(--tmut)','font-family':'JetBrains Mono,monospace','font-size':'6.5'});
    ht2.textContent=(nav.tech.name.length>14?nav.tech.name.slice(0,13)+'…':nav.tech.name).toUpperCase();hub.appendChild(ht2);
    hub.addEventListener('click',()=>{drillUp();});
    svg.appendChild(hub);
  }

  setupBlipEvents(blips);
  renderBreadcrumb();
  refreshBlips();
}

// ═══════════════════════════════════════════════════════════════
//  BLIP INTERACTION
// ═══════════════════════════════════════════════════════════════
function setupBlipEvents(blips){
  const tip=document.getElementById('tip');
  for(const b of blips){
    const g=b._el;
    g.addEventListener('mouseenter',e=>{
      const suffix=b.kind==='tech'?` · ${b.ref.subs.length} sub-tech`:` · ${b.count} profiles`;
      tip.textContent=`${b.name}${suffix}`;tip.classList.add('show');moveTip(e);
      if(!g.classList.contains('dim'))g.querySelector('.bmain').setAttribute('r','16');
    });
    g.addEventListener('mousemove',moveTip);
    g.addEventListener('mouseleave',()=>{tip.classList.remove('show');if(!g.classList.contains('sel'))g.querySelector('.bmain').setAttribute('r','14');});
    g.addEventListener('click',()=>onBlipClick(b));
  }
}
function moveTip(e){const t=document.getElementById('tip');t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-34)+'px';}

function onBlipClick(b){
  if(b.kind==='tech'){
    // drill into technology → show sub-techs on radar + open tech panel
    nav={tech:b.ref, sub:null};
    selKey=null; activeR=null; syncRingUI();
    buildRadar();
    openTechPanel(b.ref);
  }else{
    // sub-tech → open profiles panel, mark selected
    nav.sub=b.ref;
    selKey=b.key; refreshBlips();
    openSubPanel(nav.tech,b.ref);
  }
}

function drillUp(){
  if(nav.profile){nav.profile=null;renderBreadcrumb();openSubPanel(nav.tech,nav.sub);return;}
  if(nav.sub){nav.sub=null;nav.profile=null;selKey=null;buildRadar();openTechPanel(nav.tech);return;}
  if(nav.tech){nav={tech:null,sub:null,profile:null};selKey=null;buildRadar();closePanel();return;}
}

function refreshBlips(){
  document.querySelectorAll('.blip').forEach(g=>{
    const key=g.dataset.key;
    const blips=currentBlips();const b=blips.find(x=>x.key===key);
    if(!b)return;
    const mR=activeR===null||b.r===activeR;
    const mS=srchQ===''||b.name.toLowerCase().includes(srchQ);
    const show=mR&&mS;
    g.classList.toggle('dim',!show);
    g.classList.toggle('sel',key===selKey);
    g.querySelector('.bmain').setAttribute('r',key===selKey?'16':'14');
  });
}

  if(nav.tech)parts.push({label:nav.tech.name,fn:()=>{nav.sub=null;selKey=null;buildRadar();openTechPanel(nav.tech);}});
  if(nav.sub)parts.push({label:nav.sub.name,fn:nav.profile?()=>{nav.profile=null;renderBreadcrumb();openSubPanel(nav.tech,nav.sub);}:null});
  if(nav.profile)parts.push({label:nav.profile.name,fn:null});
  bc.innerHTML='';
  parts.forEach((p,i)=>{
    if(i>0){const sep=document.createElement('span');sep.className='crumb-sep';sep.textContent='›';bc.appendChild(sep);}
    const el=document.createElement('span');
    el.className='crumb'+((i===parts.length-1)?' current':'');
    el.textContent=p.label;
    if(p.fn&&i!==parts.length-1)el.addEventListener('click',p.fn);
    bc.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════
//  LEGENDS & FILTERS
// ═══════════════════════════════════════════════════════════════
function buildRingFilter(){
  const rf=document.getElementById('ring-filter');
  rf.innerHTML='<div class="rf-title">Seniority</div>';
  // display outer→inner (Regular first) to match visual top-down
  for(const r of [...RINGS].reverse()){
    const p=document.createElement('button');p.className='rpill';p.dataset.rid=r.id;
    p.innerHTML=`<span class="rpip" style="background:${r.color}"></span>${r.name}`;
    p.addEventListener('click',()=>{
      if(activeR===r.id){activeR=null;p.classList.remove('on');}
      else{activeR=r.id;document.querySelectorAll('.rpill').forEach(x=>x.classList.remove('on'));p.classList.add('on');}
      refreshBlips();
    });
    rf.appendChild(p);
  }
}
function syncRingUI(){document.querySelectorAll('.rpill').forEach(x=>x.classList.remove('on'));}

function buildLegend(){
  const leg=document.getElementById('quad-legend');leg.innerHTML='';
  for(const c of CATS){
    const p=document.createElement('button');p.className='qpill';p.dataset.cid=c.id;
    p.innerHTML=`<span class="qdot" style="background:${c.color}"></span>${c.name}`;
    p.addEventListener('click',()=>{
      // jump to first tech in that category at top level
      if(nav.tech){nav={tech:null,sub:null};selKey=null;closePanel();}
      srchQ='';document.getElementById('srch').value='';
      // pulse-highlight: temporarily filter by searching category techs
      const techs=TECH.filter(t=>t.cat===c.id).map(t=>t.name.toLowerCase());
      buildRadar();
      document.querySelectorAll('.blip').forEach(g=>{
        const key=g.dataset.key;const b=currentBlips().find(x=>x.key===key);
        g.classList.toggle('dim',!(b&&b.cat===c.id));
      });
      document.querySelectorAll('.qpill').forEach(x=>x.classList.remove('on'));
      p.classList.add('on');
    });
    leg.appendChild(p);
  }
}

document.getElementById('srch').addEventListener('input',e=>{
  srchQ=e.target.value.toLowerCase().trim();
  document.querySelectorAll('.qpill').forEach(x=>x.classList.remove('on'));
  refreshBlips();
});

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
buildRingFilter();
buildLegend();
buildRadar();

</script>
